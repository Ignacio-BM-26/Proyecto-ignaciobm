<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Revisa y gestiona los productos en tu carrito. Finaliza tu compra de manera rápida y segura.">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!--link de css-->
    <link rel="stylesheet" href="../css/style.css">
    <title>Carrito</title>
</head>
<body>
    <header>
        <!-- imagen logo -->
        <div class="logo-container">
           <img src="../img/Alta-pinta.png" alt="Logo">
       </div>
       <!-- barra de navegacion -->
       <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link" href="../index.html">Inicio</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./productos.html">Productos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./nosotros.html">Nosotros</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./contactos.html">Contacto</a>

                <a class="nav-link" href="./carrito.html">Carrito</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
       <div class="scroll-link">
           <a href="#footer">Ir abajo</a>
       </div>
   </header>
    
   <main class="main-carrito">
    <section class="carrito">
        <h2 class="titulo-carrito">Tu Carrito</h2>
        <div class="productos-carrito">
            <div class="producto">
                <img src="../img/remera-oversize-clara.jpg" alt="remera-oversize-clara" class="imagen-producto">
                <div class="detalle-producto">
                    <h3 class="nombre-producto">Remera oversize</h3>
                    <p class="precio-producto">$25000</p>
                    <input type="number" class="cantidad" value="1" min="1">
                    <button class="boton-eliminar">Eliminar</button>
                </div>
            </div> 

            <div class="producto">
                <img src="../img/Gorra-vintagerosa.jpg" alt="Gorra rosa" class="imagen-producto">
                <div class="detalle-producto">
                    <h3 class="nombre-producto">Gorra Vintage Rosa</h3>
                    <p class="precio-producto">$12000</p>
                    <input type="number" class="cantidad" value="1" min="1">
                    <button class="boton-eliminar">Eliminar</button>
                </div>
            </div> 
        </div> 
    </section>                
              <div class="total-carrito">
                     <p>Total: <span class="precio-total">$37000</span></p>
                      <button class="boton-finalizar">Finalizar Compra</button>
                </div>
</main>

    <Footer>
        <p> Todos los derechos reservados</p>
